name: test

on:
  # this workflow triggered on below condition [push, pull_request]
  push:
    branches: [ main ]
  pull_request:
    branches: [ "*" ]

# cancel previous similar workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_cli:

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:

    - uses: actions/checkout@v4

    - name: Set up python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install package
      run: uv pip install . --system

    - name: Version and help
      run: |
        brkraw-legacy --version
        brkraw-legacy --help


  test_unit:
    # Pure-unit suite: no sample data, so it fans out across the full matrix.

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:

    - uses: actions/checkout@v4

    - name: Set up python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install dependencies
      run: uv pip install .[dev] --system

    - name: Run unit tests (no network data)
      run: pytest -m "not data"


  test_data:
    # Data-dependent tests fetch ~1.6 GB of public sample data (Zenodo + LFS
    # repos); run once on a single interpreter with the datasets cached.

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Set up python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install dependencies
      run: uv pip install .[dev] --system

    - name: Cache sample datasets
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/brkraw_test_data
        key: brkraw-sample-data-v1

    - name: Run data-dependent tests
      env:
        BRKRAW_TEST_DATA_DIR: ${{ runner.temp }}/brkraw_test_data
      run: pytest -m data
